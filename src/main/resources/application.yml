problem:
  stack-trace: false
micronaut:
  application:
    name: oda-recipient-service
  serde:
    serialization:
      inclusion: ALWAYS
  executors:
    rabbit:
      nThreads: 1
      type: fixed
      name: rabbit
  security:
    token:
      bearer:
        enabled: true
      cookie:
        enabled: true
      jwt:
        signatures:
          jwks:
            keycloak:
              url: ${JWKS_URI}
endpoints:
  flyway:
    enabled: true
flyway:
  datasources:
    default:
      enabled: true
      baseline-on-migrate: true
      validate-migration-naming: false
      validate-on-migrate: false
rabbitmq:
  host: ${RABBITMQ_HOST:`localhost`}
  consumer-executor: "rabbit"
infinispan:
  client:
    hotrod:
      server:
        host: "${INFINISPAN_HOST: `127.0.0.1`}"
        port: "${INFINISPAN_PORT: 11222}"
      security:
        authentication:
          username: "${INFINISPAN_USER: `admin`}"
          password: "${INFINISPAN_PASSWORD: `password`}"
